<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AlNews — Noticias del Mundo</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Sans+3:wght@300;400;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--ink:#0a0a0a;--paper:#f5f0e8;--cream:#ede8dc;--accent:#c0392b;--accent2:#1a3a5c;--muted:#6b6560;--card-bg:#faf8f4;--border:#d4cdc0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--paper);color:var(--ink);font-family:'Source Sans 3',sans-serif;font-weight:300;min-height:100vh}
header{background:var(--ink);color:var(--paper);position:sticky;top:0;z-index:100;border-bottom:3px solid var(--accent)}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:10px 24px 8px;border-bottom:1px solid #333}
.live-dot{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);font-weight:600}
.live-dot span{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.7)}}
.date-time{font-size:11px;color:#999;letter-spacing:1px}
.refresh-btn{background:none;border:1px solid #444;color:#aaa;padding:4px 10px;font-size:10px;letter-spacing:1px;cursor:pointer;transition:all 0.2s;text-transform:uppercase}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
.masthead{text-align:center;padding:12px 24px 10px}
.masthead h1{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,8vw,5rem);font-weight:900;letter-spacing:-2px;line-height:1;color:var(--paper)}
.masthead h1 span{color:var(--accent)}
.masthead-sub{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#777;margin-top:4px}
.ticker-wrap{background:var(--accent);overflow:hidden;padding:5px 0;position:relative;height:26px;display:flex;align-items:center}
.ticker-label{position:absolute;background:#8b1a12;color:white;padding:0 10px;font-size:10px;letter-spacing:2px;font-weight:600;height:100%;display:flex;align-items:center;z-index:2}
.ticker-container{flex:1;overflow:hidden;padding-left:90px}
.ticker-track{display:flex;animation:ticker 50s linear infinite;white-space:nowrap}
.ticker-track:hover{animation-play-state:paused}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{color:white;font-size:12px;padding:0 30px;font-weight:600}
.ticker-item::before{content:'◆';margin-right:12px;opacity:0.6;font-size:8px}
nav{background:var(--cream);border-bottom:2px solid var(--border);overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.nav-inner{display:flex;padding:0 16px;min-width:max-content}
.cat-btn{background:none;border:none;padding:12px 18px;font-family:'Source Sans 3',sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s;white-space:nowrap}
.cat-btn:hover{color:var(--ink)}
.cat-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
main{max-width:1300px;margin:0 auto;padding:28px 16px;position:relative;z-index:1}
.hero-section{display:grid;grid-template-columns:1fr 340px;gap:0;margin-bottom:32px;border:1px solid var(--border);background:var(--card-bg);overflow:hidden;box-shadow:4px 4px 0 var(--border)}
@media(max-width:768px){.hero-section{grid-template-columns:1fr}.hero-aside{border-left:none!important;border-top:1px solid var(--border)}}
.hero-main{padding:28px;display:flex;flex-direction:column;justify-content:flex-end;min-height:320px;position:relative;overflow:hidden}
.hero-image{position:absolute;inset:0;background:linear-gradient(135deg,var(--accent2) 0%,#0d1f35 100%);overflow:hidden}
.hero-image img{width:100%;height:100%;object-fit:cover;opacity:0.4;transition:opacity 0.3s}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,10,10,0.92) 0%,rgba(10,10,10,0.3) 60%,transparent 100%)}
.hero-content{position:relative;z-index:2}
.hero-tag{display:inline-block;background:var(--accent);color:white;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:700;padding:3px 8px;margin-bottom:10px}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(1.4rem,3vw,2rem);font-weight:700;color:white;line-height:1.2;margin-bottom:10px;cursor:pointer;transition:color 0.2s}
.hero-title:hover{color:#f0c080}
.hero-desc{color:#ccc;font-size:13px;line-height:1.6;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-meta{display:flex;align-items:center;gap:12px;font-size:11px;color:#999}
.source-badge{background:rgba(255,255,255,0.1);color:#ccc;padding:2px 8px;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;border:1px solid rgba(255,255,255,0.2)}
.hero-aside{border-left:1px solid var(--border);overflow:hidden}
.aside-title{padding:12px 16px;font-size:9px;letter-spacing:3px;text-transform:uppercase;font-weight:700;color:var(--muted);border-bottom:1px solid var(--border);background:var(--cream)}
.section-header{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--ink)}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px}
.section-count{font-size:11px;color:var(--muted);letter-spacing:1px}
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:40px}
.news-card{background:var(--card-bg);border:1px solid var(--border);overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;cursor:pointer;animation:fadeIn 0.4s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.news-card:hover{transform:translateY(-3px);box-shadow:4px 6px 0 var(--border)}
.card-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#ddd}
.card-img-placeholder{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,var(--cream),var(--border));display:flex;align-items:center;justify-content:center;font-size:2.5rem}
.card-body{padding:14px 16px 16px}
.card-source-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.card-source{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent)}
.card-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;line-height:1.3;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-desc{font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:10px}
.card-footer{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:#aaa;border-top:1px solid var(--border);padding-top:10px}
.card-lang{background:var(--cream);color:var(--muted);padding:1px 6px;font-size:9px;font-weight:700;letter-spacing:1px;border:1px solid var(--border)}
.mini-card{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}
.mini-card:hover{background:var(--cream)}
.mini-card:last-child{border-bottom:none}
.mini-source{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin-bottom:5px}
.mini-title{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mini-time{font-size:10px;color:#aaa;margin-top:4px}
.skeleton{background:var(--card-bg);border:1px solid var(--border)}
.skeleton-img{width:100%;aspect-ratio:16/9;background:linear-gradient(90deg,var(--cream) 25%,var(--border) 50%,var(--cream) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
.skeleton-body{padding:14px 16px}
.skeleton-line{height:12px;background:linear-gradient(90deg,var(--cream) 25%,var(--border) 50%,var(--cream) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;margin-bottom:8px;border-radius:2px}
.skeleton-line.short{width:60%}
.skeleton-line.tall{height:16px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.error-box{text-align:center;padding:40px 20px;color:var(--muted);grid-column:1/-1}
footer{background:var(--ink);color:#666;text-align:center;padding:20px;font-size:11px;letter-spacing:1px;margin-top:40px}
footer span{color:var(--accent)}
.refresh-badge{position:fixed;bottom:20px;right:20px;background:var(--ink);color:var(--paper);padding:8px 14px;font-size:10px;border:1px solid #333;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none;z-index:200}
.refresh-badge.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>
<header>
<div class="header-top">
<div class="live-dot"><span></span> En vivo</div>
<div class="date-time" id="datetime"></div>
<button class="refresh-btn" onclick="loadAll()">↺ Actualizar</button>
</div>
<div class="masthead">
<h1>Al<span>News</span></h1>
<div class="masthead-sub">Noticias del Mundo · Tiempo Real</div>
</div>
<div class="ticker-wrap">
<div class="ticker-label">ÚLTIMAS</div>
<div class="ticker-container">
<div class="ticker-track" id="ticker"><span class="ticker-item">Cargando titulares...</span></div>
</div>
</div>
</header>
<nav><div class="nav-inner" id="cats"></div></nav>
<main>
<div class="hero-section" id="hero" style="display:none">
<div class="hero-main">
<div class="hero-image"><img id="hero-img" src="" alt="" onerror="this.style.display='none'"></div>
<div class="hero-overlay"></div>
<div class="hero-content">
<div class="hero-tag" id="hero-tag">MUNDO</div>
<div class="hero-title" id="hero-title" onclick="openHero()"></div>
<div class="hero-desc" id="hero-desc"></div>
<div class="hero-meta"><span class="source-badge" id="hero-source"></span><span id="hero-time"></span></div>
</div>
</div>
<div class="hero-aside">
<div class="aside-title">Más titulares</div>
<div id="aside-list"></div>
</div>
</div>
<div class="section-header">
<div class="section-title" id="grid-label">Cargando...</div>
<div class="section-count" id="grid-count"></div>
</div>
<div id="news-grid" class="news-grid"></div>
</main>
<footer><p>AlNews · NewsData.io · <span>Sin rastreo · Sin cookies</span></p><p style="margin-top:6px">Auto-actualización cada 5 min</p></footer>
<div class="refresh-badge" id="refresh-badge">✓ Noticias actualizadas</div>
<script>
const API_KEY = 'pub_d03862cbc05e4a0088a1615ef27f3e12';
const BASE = 'https://newsdata.io/api/1/news';

const QUERIES = [
  {params:'language=es&category=top',          flag:'🌎', cat:'mundo'},
  {params:'language=en&category=top',          flag:'🌍', cat:'mundo'},
  {params:'language=es&country=mx',            flag:'🇲🇽', cat:'mexico'},
  {params:'language=es&category=politics',     flag:'🌎', cat:'mundo'},
  {params:'language=es&category=sports',       flag:'⚽', cat:'deportes'},
  {params:'language=en&category=sports',       flag:'🏈', cat:'deportes'},
  {params:'language=es&category=technology',   flag:'💡', cat:'tech'},
  {params:'language=en&category=technology',   flag:'💻', cat:'tech'},
  {params:'language=en&category=science',      flag:'🔬', cat:'ciencia'},
];

const CATS=[
  {key:'todo',    label:'🌐 Todo'},
  {key:'mundo',   label:'📰 Mundo'},
  {key:'mexico',  label:'🇲🇽 México'},
  {key:'latam',   label:'🌎 Latam'},
  {key:'deportes',label:'⚽ Deportes'},
  {key:'tech',    label:'💻 Tech'},
  {key:'ciencia', label:'🔬 Ciencia'},
];

let allArticles=[], currentCat='todo', heroUrl='';

function initCats(){
  const nav=document.getElementById('cats');
  CATS.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='cat-btn'+(c.key===currentCat?' active':'');
    btn.textContent=c.label;
    btn.onclick=()=>{
      currentCat=c.key;
      document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    };
    nav.appendChild(btn);
  });
}

async function fetchQuery(q){
  try{
    const url=`${BASE}?apikey=${API_KEY}&${q.params}&size=10`;
    const r=await fetch(url,{signal:AbortSignal.timeout(10000)});
    if(!r.ok)return[];
    const d=await r.json();
    if(!d.results)return[];
    return d.results.map(a=>({
      title:a.title||'',
      desc:a.description||'',
      link:a.link||'',
      image:a.image_url||'',
      pubDate:a.pubDate||'',
      source:a.source_name||a.source_id||'News',
      flag:q.flag,
      lang:(a.language||'es').toUpperCase(),
      cat:q.cat
    }));
  }catch(e){return[];}
}

function timeAgo(dateStr){
  if(!dateStr)return'';
  const d=new Date(dateStr);
  if(isNaN(d))return'';
  const diff=Math.floor((Date.now()-d)/60000);
  if(diff<1)return'Ahora';
  if(diff<60)return`Hace ${diff}m`;
  if(diff<1440)return`Hace ${Math.floor(diff/60)}h`;
  return`Hace ${Math.floor(diff/1440)}d`;
}

async function loadAll(){
  showSkeletons();
  const results=await Promise.allSettled(QUERIES.map(q=>fetchQuery(q)));
  allArticles=[];
  results.forEach(r=>{if(r.status==='fulfilled')allArticles.push(...r.value)});
  const seen=new Set();
  allArticles=allArticles.filter(a=>{
    const k=a.title.slice(0,60);
    if(seen.has(k))return false;
    seen.add(k);
    return true;
  });
  allArticles.sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));
  renderHero();
  renderTicker();
  renderGrid();
  showRefreshBadge();
}

function renderHero(){
  const pool=allArticles.filter(a=>a.image&&a.cat==='mundo');
  if(!pool.length)return;
  const h=pool[0];
  heroUrl=h.link;
  document.getElementById('hero-img').src=h.image;
  document.getElementById('hero-tag').textContent=h.source.toUpperCase();
  document.getElementById('hero-title').textContent=h.title;
  document.getElementById('hero-desc').textContent=h.desc.slice(0,220);
  document.getElementById('hero-source').textContent=h.flag+' '+h.source;
  document.getElementById('hero-time').textContent=timeAgo(h.pubDate);
  document.getElementById('hero').style.display='grid';
  const aside=document.getElementById('aside-list');
  aside.innerHTML='';
  pool.slice(1,6).forEach(a=>{
    const div=document.createElement('div');
    div.className='mini-card';
    div.innerHTML=`<div class="mini-source">${a.flag} ${a.source}</div><div class="mini-title">${a.title}</div><div class="mini-time">${timeAgo(a.pubDate)}</div>`;
    div.onclick=()=>window.open(a.link,'_blank');
    aside.appendChild(div);
  });
}

function openHero(){if(heroUrl)window.open(heroUrl,'_blank')}

function renderTicker(){
  const items=allArticles.slice(0,20).map(a=>`<span class="ticker-item">${a.flag} ${a.source}: ${a.title}</span>`).join('');
  const t=document.getElementById('ticker');
  t.innerHTML=items+items;
}

function renderGrid(){
  const filtered=currentCat==='todo'?allArticles:allArticles.filter(a=>a.cat===currentCat);
  document.getElementById('grid-label').textContent=CATS.find(c=>c.key===currentCat)?.label.replace(/^[^\s]+\s/,'')||'Noticias';
  document.getElementById('grid-count').textContent=`${filtered.length} artículos`;
  const grid=document.getElementById('news-grid');
  grid.innerHTML='';
  if(!filtered.length){
    grid.innerHTML='<div class="error-box"><p style="font-size:2rem">📭</p><p>Sin artículos en esta categoría.</p></div>';
    return;
  }
  filtered.forEach((a,i)=>{
    const card=document.createElement('div');
    card.className='news-card';
    card.style.animationDelay=`${Math.min(i,20)*40}ms`;
    const imgHtml=a.image
      ?`<img class="card-img" src="${a.image}" alt="" onerror="this.outerHTML='<div class=\\'card-img-placeholder\\'>📰</div>'" loading="lazy">`
      :`<div class="card-img-placeholder">${a.flag}</div>`;
    card.innerHTML=`${imgHtml}<div class="card-body"><div class="card-source-row"><span class="card-source">${a.source}</span><span>${a.flag}</span></div><div class="card-title">${a.title}</div><div class="card-desc">${a.desc.slice(0,120)}</div><div class="card-footer"><span>${timeAgo(a.pubDate)}</span>${a.lang==='EN'?'<span class="card-lang">EN</span>':''}</div></div>`;
    card.onclick=()=>window.open(a.link,'_blank');
    grid.appendChild(card);
  });
}

function showSkeletons(){
  const grid=document.getElementById('news-grid');
  grid.innerHTML=Array(8).fill(0).map(()=>`<div class="skeleton"><div class="skeleton-img"></div><div class="skeleton-body"><div class="skeleton-line short"></div><div class="skeleton-line tall"></div><div class="skeleton-line tall"></div><div class="skeleton-line short"></div></div></div>`).join('');
  document.getElementById('grid-label').textContent='Cargando...';
  document.getElementById('grid-count').textContent='';
}

function updateClock(){
  const now=new Date();
  document.getElementById('datetime').textContent=now.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short'})+' · '+now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
}

function showRefreshBadge(){
  const b=document.getElementById('refresh-badge');
  b.classList.add('show');
  setTimeout(()=>b.classList.remove('show'),2500);
}

initCats();
updateClock();
setInterval(updateClock,30000);
loadAll();
setInterval(loadAll,5*60*1000);
</script>
</body>
</html>
